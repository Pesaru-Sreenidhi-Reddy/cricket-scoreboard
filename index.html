<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Cricket Score Board</title>
    <link rel ="icon" href="bat.png">
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>
<body>
    <div id="whole-container">
    <div id="inputs-container">
        <div id="matchh2"><h2>Match Details</h2></div>
<label for="overs"  >Overs:</label> 
<input type="number" id="overs"  placeholder="e.g., 20"  >

    <label for="team1name"  >Team 1 name:</label><input type="text" id="team1name" placeholder="e.g., India">

<label for="team2name" >Team 2 name:</label><input type="text" id="team2name" placeholder="e.g., Pakistan">

    <label for="whoIsBattingFirst"  >Who is batting first:</label><input type="text" id="whoIsBattingFirst" placeholder="e.g., India">

   <div id="submit-container"> <button type="button" onclick="storeOvers()" id="submit">Submit</button></div>
</div>
<div id="teams-container" class="hidden">
    <h1>Cricket Scoreboard</h1>
 <div>
    <div >
    <h2 id="team1h2"></h2>
    <h3 id="team1score"></h3>
    <div id="team1upd">
    <label for="team1runs">Runs:</label>&nbsp;<input id="team1runs">
    <button onclick="enterRuns(event)" id="team1btn">Update</button>
    </div>
    </div>

    <div >
    <h2 id="team2h2"></h2>
    <h3 id="team2score"></h3>
    <div id="team2upd">
    <label for="team2runs">Runs:</label>&nbsp;<input id="team2runs">
    <button onclick="enterRuns(event)" id="team2btn">Update</button>
    </div>
    </div>
</div>
    <p id="res">Number of balls remaining:&nbsp;<span id="balls-rem"></span></p>
    
</div>
<p id="error"></p>
</div>
</div>
</body>
</html>
